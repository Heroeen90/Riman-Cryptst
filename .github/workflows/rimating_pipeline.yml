name: Riman Cryptst - Consolidated CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Lint Analysis
        run: flutter analyze

      - name: Run Unit Tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "Skipping tests (no test suite directory found)."
          fi

      - name: Build Debug APK
        run: |
          flutter build apk --debug --android-skip-build-dependency-validation

      - name: Build Release APK
        run: |
          flutter build apk --release --android-skip-build-dependency-validation

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build Web
        run: flutter build web --base-href "/Riman-Cryptst/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
