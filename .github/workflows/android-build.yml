Name: Riman Cryptst - Production DevOps CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Flutter Android Production Build Quality Gate
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Java Development Kit (JDK 17) required for modern Gradle and Flutter
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Setup Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      # Step 4: Cache Flutter Pub Packages
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 4.5: [تعديل الحصانة] تنظيف الكاش القديم بالكامل لمنع تضارب كوتلن والأذونات
      - name: Clean Flutter Build and Dependencies Cache
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter clean
          fi

      # Step 5: Check and Fetch Dependencies
      - name: Install Dependencies
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            echo "::warning title=Missing pubspec.yaml::No pubspec.yaml found at repository root. Skipping flutter pub get."
          fi

      # Step 6: Validate Package Outdated Status
      - name: Outdated Packages Check
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub outdated || true
          fi

      # Step 7: Static Analysis (Quality Gate)
      - name: Static Lint Analysis
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze || echo "::warning title=Linting warnings detected::Some flutter analysis issues found, proceeding..."
          fi

      # Step 8: Unit test run (Quality Gate)
      - name: Run Tests
        run: |
          if [ -f "pubspec.yaml" ] && [ -d "test" ]; then
            flutter test
          else
            echo "Skipping tests (no test suite directory or pubspec found)."
          fi

      # Step 9: Build Debug APK [تعديل الحصانة بالتخطي العتادي للتكامل]
      - name: Build Debug APK
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --debug --android-skip-build-dependency-validation
          fi

      # Step 10: Build Release APK [تعديل الحصانة بالتخطي العتادي للتكامل]
      - name: Build Release APK
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --release --android-skip-build-dependency-validation
          fi

      # Step 11: Collect and Upload Artifacts (Build output)
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riman-cryptst-apks-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/flutter-apk/app-debug.apk
            **/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
