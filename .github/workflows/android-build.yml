name: Riman Cryptst - Production DevOps CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Flutter Android Production Build Quality Gate
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Java Development Kit (JDK 17)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Setup Fixed Flutter Environment (تثبيت الإصدار لمنع تعارض الـ Gradle مستقبلاً)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      # Step 4: Cache Flutter Pub Packages
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Step 5: Check and Fetch Dependencies
      - name: Install Dependencies
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            echo "::warning title=Missing pubspec.yaml::No pubspec.yaml found at repository root. Skipping flutter pub get."
            exit 1
          fi

      # Step 6: Validate Package Outdated Status
      - name: Outdated Packages Check
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub outdated || true
          fi

      # Step 7: Static Analysis (Quality Gate)
      - name: Static Lint Analysis
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze || echo "::warning title=Linting warnings detected::Some flutter analysis issues found, proceeding..."
          fi

      # Step 8: Unit test run (Quality Gate)
      - name: Run Tests
        run: |
          if [ -f "pubspec.yaml" ] && [ -d "test" ]; then
            flutter test
          else
            echo "Skipping tests (no test suite directory or pubspec found)."
          fi

      # Step 9: Build Release APK (تم الإبقاء على الـ Release لأنه الأهم للإنتاج)
      - name: Build Release APK
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --release
          fi

      # Step 10: Collect and Upload Artifacts (تحسين مسار المخرجات ليصبح أدق)
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riman-cryptst-release-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
